<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇組別</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5" style="max-width: 700px;">
        <h2 class="text-center text-success fw-bold mb-4">🏆 木球賽事裁判系統</h2>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h5 class="mb-4 fw-bold">請選擇您負責的組別</h5>

                <div class="d-grid gap-3">
                    {% for group in groups %}
                    <a href="/referee/{{ group }}" class="btn btn-outline-success btn-lg fw-bold">
                        進入 {{ group }} 計分
                    </a>
                    {% endfor %}

                    {% if not groups %}
                    <div class="alert alert-warning text-center mb-0">
                        目前尚無組別，請先到後台匯入或新增球員。
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="/admin" class="btn btn-sm btn-secondary">進入後台管理</a>
        </div>
    </div>
</body>
</html>
