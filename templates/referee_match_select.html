<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>裁判端 - 選擇賽事</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f8f9fa; }
        .page { max-width: 560px; margin: 0 auto; padding: 18px; }
        .match-btn { min-height: 64px; font-size: 1.05rem; }
    </style>
</head>
<body>
<div class="page">
    <h3 class="fw-bold text-success text-center mb-3">🏆 木球裁判端</h3>
    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="fw-bold mb-3">第一頁：選擇賽事</h5>
            <div class="d-grid gap-3">
                {% for m in all_matches %}
                <a class="btn btn-outline-success match-btn d-flex align-items-center justify-content-center"
                   href="/referee/select/{{ m.filename }}">
                    {{ m.name }}
                    {% if m.filename == current_file %}
                    <span class="badge bg-success ms-2">目前</span>
                    {% endif %}
                </a>
                {% endfor %}
                {% if not all_matches %}
                <div class="alert alert-warning mb-0">目前沒有賽事，請先到後台建立賽事。</div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
</body>
</html>
