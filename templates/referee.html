<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>裁判計分系統</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .score-box {
            font-size: 2.3rem;
            font-weight: bold;
            width: 90px;
            text-align: center;
        }

        .btn-circle {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-card {
            border-radius: 14px;
            border: 1px solid #e9ecef;
        }

        .player-name {
            font-size: 1.15rem;
        }

        .sticky-submit {
            position: sticky;
            bottom: 0;
            background: #f8f9fa;
            padding: 12px 0;
            z-index: 999;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-dark bg-success mb-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">第 {{ group_id }} 組 - 木球計分</span>
            <a href="/referee" class="btn btn-outline-light btn-sm">更換組別</a>
        </div>
    </nav>

    <div class="container mb-5">

        <div class="card shadow-sm mb-3 border-0">
            <div class="card-body">
                <label class="form-label fw-bold">📍 目前球道</label>

                <select class="form-select form-select-lg" id="currentHole" onchange="loadTempScores()">
                    {% for i in range(1, 13) %}
                    <option value="{{ i }}">
                        第 {{ i }} 洞
                        {% if course and course.holes and course.holes[i|string] %}
                        ｜Par {{ course.holes[i|string].par }}｜{{ course.holes[i|string].distance }}m
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        {% for pid, player in players.items() %}
        <div class="card shadow-sm mb-3 player-card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <div class="fw-bold text-primary player-name">{{ player.name }}</div>
                        <span class="badge bg-secondary">{{ player.school }}</span>
                    </div>
                    <span class="badge bg-success">ID {{ pid }}</span>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-4">
                    <button class="btn btn-danger btn-circle" onclick="updateScore('{{ pid }}', -1)">-</button>
                    <div id="score_{{ pid }}" class="score-box text-dark">
                        {{ player.scores.get("1", 0) if player.scores else 0 }}
                    </div>
                    <button class="btn btn-primary btn-circle" onclick="updateScore('{{ pid }}', 1)">+</button>
                </div>
            </div>
        </div>
        {% endfor %}

        {% if not players %}
        <div class="alert alert-warning text-center">
            此組目前沒有球員資料。
        </div>
        {% endif %}

        <div class="sticky-submit">
            <div class="d-grid gap-2">
                <button id="submitBtn" class="btn btn-success btn-lg shadow fw-bold" onclick="submitScores()">
                    ⬆️ 送出本洞成績
                </button>

                <button class="btn btn-outline-secondary btn-lg" onclick="clearCurrentHoleScores()">
                    清空目前畫面分數
                </button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        const playerIds = [
            {% for pid in players.keys() %}
            "{{ pid }}",
            {% endfor %}
        ];

        const savedServerScores = {
            {% for pid, player in players.items() %}
            "{{ pid }}": {
                {% for h, s in player.scores.items() %}
                "{{ h }}": "{{ s }}",
                {% endfor %}
            },
            {% endfor %}
        };

        function getStorageKey(pid) {
            const hole = document.getElementById('currentHole').value;
            return `woodball_group_{{ group_id }}_hole_${hole}_player_${pid}`;
        }

        function updateScore(pid, change) {
            const scoreElement = document.getElementById(`score_${pid}`);
            let currentScore = parseInt(scoreElement.innerText);

            if (isNaN(currentScore)) currentScore = 0;

            let newScore = currentScore + change;

            if (newScore < 0) newScore = 0;

            scoreElement.innerText = newScore;
            localStorage.setItem(getStorageKey(pid), newScore);
        }

        function loadTempScores() {
            const hole = document.getElementById('currentHole').value;

            playerIds.forEach(pid => {
                const scoreElement = document.getElementById(`score_${pid}`);
                const localScore = localStorage.getItem(getStorageKey(pid));

                if (localScore !== null) {
                    scoreElement.innerText = localScore;
                    return;
                }

                if (savedServerScores[pid] && savedServerScores[pid][hole]) {
                    scoreElement.innerText = savedServerScores[pid][hole];
                    return;
                }

                scoreElement.innerText = 0;
            });
        }

        function clearCurrentHoleScores() {
            if (!confirm("確定清空目前畫面上的本洞分數？")) return;

            playerIds.forEach(pid => {
                document.getElementById(`score_${pid}`).innerText = 0;
                localStorage.removeItem(getStorageKey(pid));
            });
        }

        function submitScores() {
            const hole = document.getElementById('currentHole').value;
            const btn = document.getElementById('submitBtn');

            if (!confirm(`確定送出第 ${hole} 洞成績？`)) return;

            btn.disabled = true;
            btn.innerText = "傳送中...";

            playerIds.forEach(pid => {
                const score = parseInt(document.getElementById(`score_${pid}`).innerText) || 0;

                socket.emit('submit_score', {
                    player_id: pid,
                    hole: hole,
                    score: score
                });

                localStorage.removeItem(getStorageKey(pid));
            });

            setTimeout(() => {
                alert(`第 ${hole} 洞成績已送出`);
                btn.disabled = false;
                btn.innerText = "⬆️ 送出本洞成績";
            }, 500);
        }

        document.addEventListener("DOMContentLoaded", loadTempScores);
    </script>
</body>
</html>
